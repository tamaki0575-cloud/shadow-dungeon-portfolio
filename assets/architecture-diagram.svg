<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1050" viewBox="0 0 1600 1050" role="img" aria-labelledby="title desc">
  <title id="title">Shadow Dungeon runtime architecture</title><desc id="desc">Bagel and input feed a game controller, room and state coordination, player, entities, collision responsibilities, and UI feedback.</desc>
  <defs><style>.title{font:700 44px 'Segoe UI',Inter,Arial,sans-serif;fill:#f8fafc}.subtitle{font:400 20px 'Segoe UI',Inter,Arial,sans-serif;fill:#94a3b8}.lane{font:700 15px 'Segoe UI',Inter,Arial,sans-serif;fill:#94a3b8;letter-spacing:1.5px}.nt{font:700 22px 'Segoe UI',Inter,Arial,sans-serif;fill:#f8fafc}.nd{font:400 16px 'Segoe UI',Inter,Arial,sans-serif;fill:#cbd5e1}.label{font:600 14px 'Segoe UI',Inter,Arial,sans-serif;fill:#cbd5e1}.framework{fill:#1e3a5f;stroke:#60a5fa}.domain{fill:#123e3a;stroke:#34d399}.decision{fill:#4b3517;stroke:#fbbf24}.state{fill:#38265f;stroke:#a78bfa}.collision{fill:#4a2026;stroke:#f87171}.output{fill:#202938;stroke:#64748b}.box{stroke-width:2.4}.flow{fill:none;stroke:#94a3b8;stroke-width:3;marker-end:url(#arrow)}.interact{fill:none;stroke:#f87171;stroke-width:2.7;marker-start:url(#red-start);marker-end:url(#red)}.own{fill:none;stroke:#34d399;stroke-width:2.7;marker-end:url(#green)}</style><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#94a3b8"/></marker><marker id="green" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#34d399"/></marker><marker id="red" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#f87171"/></marker><marker id="red-start" markerWidth="10" markerHeight="10" refX="1" refY="5" orient="auto"><path d="M10 0L0 5L10 10Z" fill="#f87171"/></marker></defs>
  <rect width="1600" height="1050" fill="#111827"/><text class="title" x="70" y="78">Shadow Dungeon — Runtime Architecture</text><text class="subtitle" x="72" y="112">Frame-driven coordination, room composition, reusable entities, and explicit collision outcomes</text>
  <rect x="45" y="145" width="1510" height="195" rx="24" fill="#142033" stroke="#263449"/><text class="lane" x="72" y="181">FRAMEWORK &amp; INPUT</text>
  <rect class="framework box" x="170" y="215" width="390" height="90" rx="16"/><text class="nt" x="365" y="252" text-anchor="middle">Bagel Game Engine</text><text class="nd" x="365" y="280" text-anchor="middle">frame callback · window · drawing</text>
  <rect class="framework box" x="1040" y="215" width="390" height="90" rx="16"/><text class="nt" x="1235" y="252" text-anchor="middle">Input System</text><text class="nd" x="1235" y="280" text-anchor="middle">keyboard snapshot · commands</text>

  <rect x="45" y="370" width="1510" height="230" rx="24" fill="#1b1828" stroke="#332c4a"/><text class="lane" x="72" y="406">COORDINATION &amp; STATE</text>
  <rect class="state box" x="510" y="420" width="580" height="105" rx="18"/><text class="nt" x="800" y="462" text-anchor="middle">Game Controller</text><text class="nd" x="800" y="492" text-anchor="middle">top-level lifecycle · overlays · transitions · restart</text>
  <rect class="state box" x="445" y="550" width="710" height="92" rx="16"/><text class="nt" x="800" y="587" text-anchor="middle">Room Manager + State Coordination</text><text class="nd" x="800" y="615" text-anchor="middle">preparation · battle · end · game-over contexts</text>
  <rect class="decision box" x="1200" y="435" width="300" height="105" rx="16"/><text class="nt" x="1350" y="477" text-anchor="middle">UI System</text><text class="nd" x="1350" y="507" text-anchor="middle">HUD · prompts · end states</text>
  <path class="flow" d="M365 305V365H690V420"/><path class="flow" d="M1235 305V365H910V420"/><path class="flow" d="M800 525V550"/><path class="flow" d="M1090 473H1200"/>

  <rect x="45" y="670" width="1510" height="300" rx="24" fill="#121f20" stroke="#21423b"/><text class="lane" x="72" y="706">GAMEPLAY SYSTEMS</text>
  <rect class="domain box" x="105" y="750" width="360" height="115" rx="16"/><text class="nt" x="285" y="793" text-anchor="middle">Player System</text><text class="nd" x="285" y="824" text-anchor="middle">movement · health · weapons · keys</text>
  <rect class="collision box" x="620" y="750" width="360" height="115" rx="16"/><text class="nt" x="800" y="793" text-anchor="middle">Collision Responsibilities</text><text class="nd" x="800" y="824" text-anchor="middle">overlap detection · outcome rules</text>
  <rect class="domain box" x="1135" y="750" width="360" height="115" rx="16"/><text class="nt" x="1315" y="793" text-anchor="middle">Entity System</text><text class="nd" x="1315" y="824" text-anchor="middle">shared lifecycles · room ownership</text>
  <path class="own" d="M690 642V705H285V750"/><path class="own" d="M800 642V750"/><path class="own" d="M910 642V705H1315V750"/>
  <path class="interact" d="M465 807H620"/><path class="interact" d="M980 807H1135"/>
  <rect class="output box" x="1015" y="900" width="185" height="68" rx="13"/><text class="nt" x="1107" y="941" text-anchor="middle" font-size="19">Items + World</text>
  <rect class="output box" x="1220" y="900" width="135" height="68" rx="13"/><text class="nt" x="1287" y="941" text-anchor="middle" font-size="19">Enemies</text>
  <rect class="output box" x="1375" y="900" width="145" height="68" rx="13"/><text class="nt" x="1447" y="941" text-anchor="middle" font-size="19">Projectiles</text>
  <path class="own" d="M1240 865V882H1107V900"/><path class="own" d="M1315 865V900"/><path class="own" d="M1390 865V882H1447V900"/>
  <text class="nd" x="1510" y="1015" text-anchor="end">Responsibility-level view · logical systems do not imply dedicated manager classes</text>
</svg>
